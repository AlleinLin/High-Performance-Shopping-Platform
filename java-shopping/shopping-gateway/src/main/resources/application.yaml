server:
  port: 8080

spring:
  application:
    name: shopping-gateway
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: shopping
        group: DEFAULT_GROUP
      config:
        server-addr: localhost:8848
        namespace: shopping
        group: DEFAULT_GROUP
        file-extension: yaml
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: shopping-user
          uri: lb://shopping-user
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=0

        - id: shopping-product
          uri: lb://shopping-product
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=0

        - id: shopping-order
          uri: lb://shopping-order
          predicates:
            - Path=/api/order/**
          filters:
            - StripPrefix=0

        - id: shopping-cart
          uri: lb://shopping-cart
          predicates:
            - Path=/api/cart/**
          filters:
            - StripPrefix=0

        - id: shopping-payment
          uri: lb://shopping-payment
          predicates:
            - Path=/api/payment/**
          filters:
            - StripPrefix=0

        - id: shopping-inventory
          uri: lb://shopping-inventory
          predicates:
            - Path=/api/inventory/**
          filters:
            - StripPrefix=0

        - id: shopping-search
          uri: lb://shopping-search
          predicates:
            - Path=/api/search/**
          filters:
            - StripPrefix=0

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 10
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

jwt:
  secret: shopping-cloud-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-security

knife4j:
  gateway:
    enabled: true
    strategy: discover
    discover:
      enabled: true
      version: openapi3

logging:
  level:
    root: info
    com.shopping: debug
    org.springframework.cloud.gateway: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
  file:
    name: logs/shopping-gateway.log
    max-size: 10MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
