version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: shopping-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shopping
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./sql/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - shopping-network

  redis:
    image: redis:7-alpine
    container_name: shopping-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - shopping-network

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: shopping-nacos
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: root
      MYSQL_SERVICE_DB_NAME: nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    depends_on:
      - mysql
    networks:
      - shopping-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    container_name: shopping-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - shopping-network

  rocketmq-namesrv:
    image: apache/rocketmq:5.1.4
    container_name: shopping-rocketmq-namesrv
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    networks:
      - shopping-network

  rocketmq-broker:
    image: apache/rocketmq:5.1.4
    container_name: shopping-rocketmq-broker
    ports:
      - "10911:10911"
      - "10909:10909"
    environment:
      NAMESRV_ADDR: "rocketmq-namesrv:9876"
    command: sh mqbroker -n rocketmq-namesrv:9876
    depends_on:
      - rocketmq-namesrv
    networks:
      - shopping-network

  seata-server:
    image: seataio/seata-server:2.0.0
    container_name: shopping-seata
    ports:
      - "8091:8091"
      - "7091:7091"
    environment:
      SEATA_IP: seata-server
    networks:
      - shopping-network

  minio:
    image: minio/minio:latest
    container_name: shopping-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - shopping-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: shopping-jaeger
    ports:
      - "16686:16686"
      - "6831:6831/udp"
    networks:
      - shopping-network

  prometheus:
    image: prom/prometheus:latest
    container_name: shopping-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - shopping-network

  grafana:
    image: grafana/grafana:latest
    container_name: shopping-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - shopping-network

volumes:
  mysql_data:
  redis_data:
  es_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  shopping-network:
    driver: bridge
