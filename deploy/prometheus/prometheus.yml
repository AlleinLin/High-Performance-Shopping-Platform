global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:

rule_files:

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "shopping-gateway"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["shopping-gateway:8080"]

  - job_name: "shopping-user"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["shopping-user:8081"]

  - job_name: "shopping-product"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["shopping-product:8082"]

  - job_name: "shopping-order"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["shopping-order:8083"]
